name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install poetry
        run: pipx install poetry==1.8.3
      - name: Install deps
        run: poetry install --no-interaction --no-root --with dev
      - name: Ruff
        run: poetry run ruff check src tests scripts
      - name: Black
        run: poetry run black --check src tests scripts
      - name: Mypy
        run: poetry run mypy src

  test:
    runs-on: ubuntu-latest
    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: vayunetra
          POSTGRES_PASSWORD: vayunetra
          POSTGRES_DB: vayunetra
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vayunetra"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 6
    env:
      DATABASE_URL: postgresql+psycopg://vayunetra:vayunetra@localhost:5432/vayunetra
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gdal-bin libgdal-dev libproj-dev libgeos-dev
      - name: Install poetry
        run: pipx install poetry==1.8.3
      - name: Install deps
        run: poetry install --no-interaction --with dev
      - name: Apply schema
        run: poetry run python -m vayunetra.storage.bootstrap
      - name: Run unit + integration tests
        run: poetry run pytest tests/unit tests/integration -q

  persistence-gate:
    # Gate that fails if the forecast model does not beat persistence baseline.
    # Skipped before Phase 2 is merged.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install poetry
        run: pipx install poetry==1.8.3
      - name: Install deps
        run: poetry install --no-interaction --with dev
      - name: Persistence gate
        run: poetry run pytest tests/eval/test_persistence_gate.py -q

name: lightgbm_quantile
horizons_h: [1, 3, 6, 12, 24, 48, 72]
target_pollutants: [pm25, pm10, no2, o3]
quantiles: [0.1, 0.5, 0.9]

lightgbm:
  objective: quantile
  metric: quantile
  n_estimators: 2000
  learning_rate: 0.03
  num_leaves: 63
  feature_fraction: 0.9
  bagging_fraction: 0.9
  bagging_freq: 5
  min_child_samples: 50
  early_stopping_rounds: 100
  verbose: -1

features:
  lags_h: [1, 3, 6, 12, 24, 48, 72]
  rolling_h: [6, 24]
  use_satellite: true
  use_fire: true
  use_calendar: true

split:
  test_days: 7
  val_days: 30

acceptance:
  min_rmse_improvement_24h: 0.15
  min_rmse_improvement_72h: 0.08

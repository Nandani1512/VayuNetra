global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: vayunetra-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: prefect
    static_configs:
      - targets: ["prefect-server:4200"]
    metrics_path: /api/health/metrics

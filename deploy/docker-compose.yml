name: vayunetra

x-env: &default-env
  env_file:
    - ../.env

services:
  postgis:
    image: timescale/timescaledb-ha:pg16
    container_name: vayunetra-postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vayunetra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vayunetra_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-vayunetra}
    volumes:
      - postgis-data:/home/postgres/pgdata/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vayunetra}"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    container_name: vayunetra-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_change_me}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 6

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_dev_change_me};
      mc mb -p local/${MINIO_BUCKET:-vayunetra} || true;
      mc mb -p local/mlflow || true;
      mc anonymous set download local/${MINIO_BUCKET:-vayunetra} || true;
      "

  redis:
    image: redis:7-alpine
    container_name: vayunetra-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 6

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: vayunetra-mlflow
    restart: unless-stopped
    depends_on:
      postgis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_change_me}
    command: >
      bash -c "pip install -q psycopg2-binary boto3 &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-vayunetra}:${POSTGRES_PASSWORD:-vayunetra_dev_change_me}@postgis:5432/${POSTGRES_DB:-vayunetra}
      --default-artifact-root s3://mlflow/"
    ports:
      - "5000:5000"

  prefect-server:
    image: prefecthq/prefect:2.20-python3.11
    container_name: vayunetra-prefect-server
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_UI_API_URL: http://localhost:4200/api
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:-vayunetra}:${POSTGRES_PASSWORD:-vayunetra_dev_change_me}@postgis:5432/prefect
    depends_on:
      postgis:
        condition: service_healthy
    ports:
      - "4200:4200"

  prefect-worker:
    image: prefecthq/prefect:2.20-python3.11
    container_name: vayunetra-prefect-worker
    restart: unless-stopped
    depends_on:
      - prefect-server
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    command: prefect worker start --pool default-agent-pool --type process

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: vayunetra-api
    restart: unless-stopped
    <<: *default-env
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src:ro
      - ../conf:/app/conf:ro
      - ../secrets:/run/secrets:ro
    profiles: ["dev", "demo"]

  prometheus:
    image: prom/prometheus:latest
    container_name: vayunetra-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    profiles: ["obs"]

  grafana:
    image: grafana/grafana:latest
    container_name: vayunetra-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    profiles: ["obs"]

volumes:
  postgis-data:
  minio-data:
  grafana-data:
